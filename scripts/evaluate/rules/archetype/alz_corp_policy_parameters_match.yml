rule_id: archetype.alz_corp_policy_parameters_match
design_area: archetype
severity: medium
description: >-
  Assigned policy parameters at the `corp` management group must match the
  values declared in the vendored ALZ `corp` archetype's per-assignment
  documents. Drift is non-blocking (surfaced as `parameter_drift` status)
  since some overrides (e.g. `listOfAllowedLocations`) are legitimate —
  but an operator should review any drift before certifying compliance.
baseline:
  source: https://github.com/Azure/Azure-Landing-Zones-Library
  path: platform/alz/archetype_definitions/corp.alz_archetype_definition.json
  sha: 4624a39edefd00b502d33d719ea0710837d32f5d
matcher:
  type: policy_parameters_match
  selector:
    resource_type: microsoft.authorization/policyassignments
    scope: mg/corp
  aggregate: tenant
  archetype_ref:
    source: https://github.com/Azure/Azure-Landing-Zones-Library
    path: platform/alz/archetype_definitions/corp.alz_archetype_definition.json
    sha: 4624a39edefd00b502d33d719ea0710837d32f5d
  ignore_parameters:
    - listOfAllowedLocations
    - effect
expected: null
message: >-
  One or more ALZ `corp` policy assignments have parameter values that
  differ from the vendored baseline. Review the drifted keys and confirm
  each override is intentional.
