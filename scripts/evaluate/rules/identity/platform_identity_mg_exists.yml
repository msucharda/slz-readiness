rule_id: identity.platform_identity_mg_exists
design_area: identity
severity: high
description: >-
  The SLZ reference architecture requires a dedicated `identity` management
  group under `platform` to host identity-plane subscriptions (e.g. AD DS,
  Entra Connect servers) with archetype policies applied.
baseline:
  source: https://github.com/Azure/Azure-Landing-Zones-Library
  path: platform/slz/architecture_definitions/slz.alz_architecture_definition.json
  sha: 8b8bdd79eac7617589296e17a159eaeaf9d47291
matcher:
  type: contains_all
  selector:
    resource_type: microsoft.management/managementgroups.summary
  aggregate: tenant
  path: present_ids
expected:
  - identity
message: >-
  The `identity` management group (child of `platform`) is not present. Create
  it so identity-plane subscriptions can be segregated and policy-scoped.
remediation_template: management-groups
