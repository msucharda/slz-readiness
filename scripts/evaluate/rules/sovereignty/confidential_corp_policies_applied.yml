rule_id: sovereignty.confidential_corp_policies_applied
design_area: sovereignty
severity: critical
description: >-
  Confidential-Corp landing zones must carry every policy assignment declared
  in the confidential_corp archetype. Includes Microsoft Cloud for
  Sovereignty's Confidential Policies initiative (Enforce-Sovereign-Conf),
  which denies resources not backed by Azure Confidential Computing and data
  resources not using customer-managed keys.
baseline:
  source: https://github.com/Azure/Azure-Landing-Zones-Library
  path: platform/slz/archetype_definitions/confidential_corp.alz_archetype_definition.json
  sha: 1b92e0bbc267e2980da94885e3d6c7d15d93a793
matcher:
  type: archetype_policies_applied
  selector:
    resource_type: microsoft.authorization/policyassignments
    scope: mg/confidential_corp
  aggregate: tenant
  archetype_ref:
    source: https://github.com/Azure/Azure-Landing-Zones-Library
    path: platform/slz/archetype_definitions/confidential_corp.alz_archetype_definition.json
    sha: 1b92e0bbc267e2980da94885e3d6c7d15d93a793
expected: null
message: >-
  Confidential-Corp archetype policies are missing. Without them, Confidential
  Computing and CMK requirements are not enforced for confidential workloads.
remediation_template: sovereignty-confidential-policies
